services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sketchblock}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sketchblock-local}
      POSTGRES_DB: postgres
    volumes:
      - sketchblock-postgres:/var/lib/postgresql
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sketchblock} -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  flyway-app:
    image: flyway/flyway:11
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./db/flyway/app/sql:/flyway/sql:ro
    command:
      - -url=jdbc:postgresql://postgres:5432/sketchblock_app
      - -user=${POSTGRES_USER:-sketchblock}
      - -password=${POSTGRES_PASSWORD:-sketchblock-local}
      - -connectRetries=20
      - migrate

  flyway-collab:
    image: flyway/flyway:11
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./db/flyway/collab/sql:/flyway/sql:ro
    command:
      - -url=jdbc:postgresql://postgres:5432/sketchblock_collab
      - -user=${POSTGRES_USER:-sketchblock}
      - -password=${POSTGRES_PASSWORD:-sketchblock-local}
      - -connectRetries=20
      - migrate

  web:
    image: ghcr.io/mimeonline/sketchblock-web:${SKETCHBLOCK_IMAGE_TAG:-local}
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        SKETCHBLOCK_VERSION: ${SKETCHBLOCK_VERSION:-local}
        NEXT_PUBLIC_COLLAB_SERVER_URL: ${NEXT_PUBLIC_COLLAB_SERVER_URL:-http://localhost:4513}
    depends_on:
      collab-server:
        condition: service_healthy
      flyway-app:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:4512}
      SKETCHBLOCK_DEPLOYMENT_ENV: ${SKETCHBLOCK_DEPLOYMENT_ENV:-local}
      SKETCHBLOCK_AUTH_MODE: ${SKETCHBLOCK_AUTH_MODE:-demo}
      SKETCHBLOCK_DEV_USER_LOGIN: ${SKETCHBLOCK_DEV_USER_LOGIN:-local-dev}
      SKETCHBLOCK_DEV_USER_NAME: ${SKETCHBLOCK_DEV_USER_NAME:-Local Dev User}
      SKETCHBLOCK_DEV_USER_PERMISSION: ${SKETCHBLOCK_DEV_USER_PERMISSION:-admin}
      SKETCHBLOCK_BOOTSTRAP_TOKEN: ${SKETCHBLOCK_BOOTSTRAP_TOKEN:-}
      SKETCHBLOCK_SESSION_INVITE_TTL_HOURS: ${SKETCHBLOCK_SESSION_INVITE_TTL_HOURS:-168}
      SKETCHBLOCK_GIT_AUTHOR_NAME: ${SKETCHBLOCK_GIT_AUTHOR_NAME:-}
      SKETCHBLOCK_GIT_AUTHOR_EMAIL: ${SKETCHBLOCK_GIT_AUTHOR_EMAIL:-}
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:-}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET:-}
      APP_AUTH_SECRET: ${APP_AUTH_SECRET:-local-compose-auth-secret-change-me}
      SKETCHBLOCK_APP_PERSISTENCE_DRIVER: ${SKETCHBLOCK_APP_PERSISTENCE_DRIVER:-postgres}
      SKETCHBLOCK_APP_DATABASE_URL: ${SKETCHBLOCK_APP_DATABASE_URL:-postgresql://sketchblock:sketchblock-local@postgres:5432/sketchblock_app}
      SKETCHBLOCK_APP_DATABASE_POOL_MAX: ${SKETCHBLOCK_APP_DATABASE_POOL_MAX:-5}
      COLLAB_SERVER_URL: http://collab-server:4513
      NEXT_PUBLIC_COLLAB_SERVER_URL: ${NEXT_PUBLIC_COLLAB_SERVER_URL:-http://localhost:4513}
      NEXT_PUBLIC_SKETCHBLOCK_VERSION: ${SKETCHBLOCK_VERSION:-local}
    ports:
      - "${SKETCHBLOCK_WEB_PORT:-4512}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  collab-server:
    image: ghcr.io/mimeonline/sketchblock-collab-server:${SKETCHBLOCK_IMAGE_TAG:-local}
    build:
      context: ./apps/collab-server
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      COLLAB_SERVER_PORT: 4513
      COLLAB_ALLOWED_ORIGINS: ${COLLAB_ALLOWED_ORIGINS:-http://localhost:4512}
      COLLAB_MAX_SNAPSHOT_BYTES: ${COLLAB_MAX_SNAPSHOT_BYTES:-25000000}
      COLLAB_AUTH_SECRET: ${APP_AUTH_SECRET:-local-compose-auth-secret-change-me}
      COLLAB_LOG_LEVEL: ${COLLAB_LOG_LEVEL:-info}
      COLLAB_LOG_FORMAT: ${COLLAB_LOG_FORMAT:-json}
      COLLAB_PERSISTENCE_DRIVER: ${COLLAB_PERSISTENCE_DRIVER:-postgres}
      COLLAB_DATABASE_URL: ${COLLAB_DATABASE_URL:-postgresql://sketchblock:sketchblock-local@postgres:5432/sketchblock_collab}
      COLLAB_DATABASE_POOL_MAX: ${COLLAB_DATABASE_POOL_MAX:-5}
      COLLAB_MAX_CLIENTS_PER_SESSION: ${COLLAB_MAX_CLIENTS_PER_SESSION:-24}
      COLLAB_MAX_ACTIVE_SESSIONS: ${COLLAB_MAX_ACTIVE_SESSIONS:-200}
      COLLAB_HTTP_REQUESTS_PER_IP_PER_MINUTE: ${COLLAB_HTTP_REQUESTS_PER_IP_PER_MINUTE:-240}
      COLLAB_SOCKET_CONNECTS_PER_IP_PER_MINUTE: ${COLLAB_SOCKET_CONNECTS_PER_IP_PER_MINUTE:-60}
      COLLAB_SOCKET_EVENTS_PER_SOCKET_PER_MINUTE: ${COLLAB_SOCKET_EVENTS_PER_SOCKET_PER_MINUTE:-300}
      COLLAB_YJS_UPDATES_PER_SOCKET_PER_MINUTE: ${COLLAB_YJS_UPDATES_PER_SOCKET_PER_MINUTE:-1800}
    ports:
      - "${SKETCHBLOCK_COLLAB_PORT:-4513}:4513"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4513/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s
    restart: unless-stopped
    depends_on:
      flyway-collab:
        condition: service_completed_successfully

volumes:
  sketchblock-postgres:
