name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Verify apps
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - apps/web
          - apps/collab-server
          - website
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.10.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: ${{ matrix.app }}/pnpm-lock.yaml

      - name: Install
        working-directory: ${{ matrix.app }}
        run: pnpm install --frozen-lockfile

      - name: Check
        working-directory: ${{ matrix.app }}
        run: pnpm run check
