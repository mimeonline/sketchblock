name: public-release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: public-release-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/sketchblock-web
  COLLAB_IMAGE: ghcr.io/${{ github.repository_owner }}/sketchblock-collab-server

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [apps/web, apps/collab-server, website]
    steps:
      - uses: actions/checkout@v6
      - name: Validate release tag and license gate
        run: |
          [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          test -f LICENSE
      - uses: pnpm/action-setup@v6
        with: {version: 11.10.0}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: ${{ matrix.app }}/pnpm-lock.yaml
      - working-directory: ${{ matrix.app }}
        run: pnpm install --frozen-lockfile
      - working-directory: ${{ matrix.app }}
        run: pnpm run check

  images:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: web
            image: sketchblock-web
            context: apps/web
          - name: collab-server
            image: sketchblock-collab-server
            context: apps/collab-server
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest
      - id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: SKETCHBLOCK_VERSION=${{ github.ref_name }}
          sbom: true
          provenance: mode=max
      - uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  release:
    needs: images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Extract release notes from changelog
        run: |
          scripts/changelog-section.sh "${GITHUB_REF_NAME}" > release-notes.md
          test -s release-notes.md
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --notes-file release-notes.md \
              --title "Sketchblock ${GITHUB_REF_NAME}"
          else
            gh release create "${GITHUB_REF_NAME}" \
              --verify-tag \
              --notes-file release-notes.md \
              --title "Sketchblock ${GITHUB_REF_NAME}"
          fi
