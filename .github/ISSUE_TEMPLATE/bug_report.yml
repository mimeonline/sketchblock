name: Bug report
description: Report a reproducible problem in Sketchblock
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Before reporting a security issue, please read SECURITY.md and contact us privately.
  - type: input
    id: version
    attributes:
      label: Sketchblock version
      description: Use the release tag, container tag, or commit SHA.
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options:
        - Docker Compose
        - Local development
        - Other self-hosted setup
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the observed and expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove credentials, tokens, repository content, invite URLs, and personal data.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Safety check
      options:
        - label: I removed secrets, private repository content, invite URLs, and personal data.
          required: true
