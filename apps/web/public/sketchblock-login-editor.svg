<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Sketchblock collaboration workspace</title>
  <desc id="desc">A neutral product preview with a visual canvas, repository status and anonymous participants.</desc>
  <rect width="1200" height="760" fill="#f6f8fb"/>
  <rect width="170" height="760" fill="#0b3045"/>
  <rect x="22" y="22" width="32" height="32" rx="8" fill="#12b8a6"/>
  <text x="66" y="45" fill="#fff" font-family="system-ui,sans-serif" font-size="18" font-weight="700">Sketchblock</text>
  <g fill="#c7d6df" font-family="system-ui,sans-serif" font-size="14">
    <text x="28" y="105">Overview</text><text x="28" y="155">Boards</text><text x="28" y="205">Collaboration</text><text x="28" y="255">Repository</text>
  </g>
  <text x="205" y="48" fill="#13222f" font-family="system-ui,sans-serif" font-size="28" font-weight="700">Live collaboration</text>
  <text x="205" y="76" fill="#64748b" font-family="system-ui,sans-serif" font-size="14">Work together on an Excalidraw board stored in your repository.</text>
  <rect x="205" y="105" width="700" height="590" rx="16" fill="#fff" stroke="#dbe3ea"/>
  <g stroke="#e7edf2" stroke-width="1">
    <path d="M230 155H880M230 205H880M230 255H880M230 305H880M230 355H880M230 405H880M230 455H880M230 505H880M230 555H880M230 605H880"/>
    <path d="M280 130V670M380 130V670M480 130V670M580 130V670M680 130V670M780 130V670"/>
  </g>
  <rect x="300" y="275" width="170" height="105" rx="12" fill="#e7f7f4" stroke="#0f9f8f" stroke-width="2"/>
  <rect x="625" y="275" width="170" height="105" rx="12" fill="#eef2ff" stroke="#5267d8" stroke-width="2"/>
  <path d="M470 328H625" stroke="#233746" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="350" y="335" fill="#13222f" font-family="system-ui,sans-serif" font-size="18" font-weight="700">Sketchblock</text>
  <text x="680" y="335" fill="#13222f" font-family="system-ui,sans-serif" font-size="18" font-weight="700">GitHub</text>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L8 3L0 6Z" fill="#233746"/></marker></defs>
  <rect x="930" y="105" width="240" height="250" rx="16" fill="#fff" stroke="#dbe3ea"/>
  <text x="955" y="140" fill="#13222f" font-family="system-ui,sans-serif" font-size="18" font-weight="700">Participants</text>
  <g font-family="system-ui,sans-serif" font-size="14" fill="#334155">
    <circle cx="975" cy="185" r="20" fill="#dff4ef"/><text x="966" y="190">DU</text><text x="1010" y="190">Demo User</text>
    <circle cx="975" cy="240" r="20" fill="#e7ecff"/><text x="967" y="245">CO</text><text x="1010" y="245">Collaborator</text>
    <circle cx="975" cy="295" r="20" fill="#f2eafe"/><text x="967" y="300">VI</text><text x="1010" y="300">Viewer</text>
  </g>
  <rect x="930" y="380" width="240" height="190" rx="16" fill="#fff" stroke="#dbe3ea"/>
  <text x="955" y="418" fill="#13222f" font-family="system-ui,sans-serif" font-size="18" font-weight="700">Repository status</text>
  <text x="955" y="460" fill="#64748b" font-family="system-ui,sans-serif" font-size="14">Branch</text><text x="1080" y="460" fill="#13222f" font-family="monospace" font-size="14">main</text>
  <text x="955" y="500" fill="#64748b" font-family="system-ui,sans-serif" font-size="14">Status</text>
  <rect x="1070" y="480" width="72" height="28" rx="14" fill="#dcfce7"/><text x="1084" y="499" fill="#166534" font-family="system-ui,sans-serif" font-size="13">Saved</text>
</svg>
